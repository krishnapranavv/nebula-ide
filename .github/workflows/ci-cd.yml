name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  S3_FRONTEND_BUCKET: ${{ secrets.S3_FRONTEND_BUCKET }}
  CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DIST_ID }}
  EC2_HOST: ${{ secrets.EC2_HOST }}

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # 1. Backend: lint + test
  # ────────────────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports: ["8000:8000"]
        options: >-
          --health-cmd "curl -sf http://localhost:8000/"
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        working-directory: backend
        run: flake8 app/ --max-line-length=100 --exclude=__pycache__

      - name: Security scan (bandit)
        working-directory: backend
        run: bandit -r app/ -ll -q

      - name: Run tests
        working-directory: backend
        env:
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key-for-ci
          DYNAMODB_ENDPOINT_URL: http://localhost:8000
          S3_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_REGION: us-east-1
          ANTHROPIC_API_KEY: ""  # mocked in tests
        run: pytest tests/ -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Frontend: lint + build
  # ────────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Deploy — only on push to main after both CI jobs pass
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write   # needed for OIDC auth with AWS
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Deploy frontend to S3 + invalidate CloudFront ──────────────────────

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.S3_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ env.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} \
            --paths "/*"

      # ── Deploy backend to EC2 via SSH ──────────────────────────────────────

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/nebula-key.pem
          chmod 600 /tmp/nebula-key.pem

      - name: Deploy backend to EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/nebula-key.pem \
              ubuntu@${{ env.EC2_HOST }} << 'ENDSSH'
            set -e
            cd /opt/nebula-ide

            echo "▶ Pulling latest code..."
            git pull origin main

            echo "▶ Rebuilding sandbox images..."
            docker build -t nebula-sandbox-python:latest -f infrastructure/docker/sandbox/Dockerfile.python . --quiet
            docker build -t nebula-sandbox-node:latest   -f infrastructure/docker/sandbox/Dockerfile.node .   --quiet
            docker build -t nebula-sandbox-cpp:latest    -f infrastructure/docker/sandbox/Dockerfile.cpp .    --quiet

            echo "▶ Restarting API..."
            docker compose up -d --build api

            echo "▶ Health check..."
            sleep 5
            curl -sf http://localhost:8000/api/health | grep -q '"status":"ok"'
            echo "✓ Deployment complete"
          ENDSSH

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/nebula-key.pem