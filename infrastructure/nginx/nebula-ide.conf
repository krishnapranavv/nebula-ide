# Nebula IDE — Production Nginx reverse proxy
# Place at: /etc/nginx/sites-available/nebula-ide.conf
# Enable: ln -s /etc/nginx/sites-available/nebula-ide.conf /etc/nginx/sites-enabled/

upstream nebula_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_HERE;

    # SSL — managed by Certbot / Let's Encrypt (free)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss:; img-src 'self' data:;" always;

    # ── API proxy ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://nebula_api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade (for /api/ws/execute)
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Execution can take up to 15s — give headroom
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Disable buffering for streaming responses
        proxy_buffering    off;
    }

    # ── WebSocket ──────────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://nebula_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── Static frontend (if not using CloudFront) ──────────────────────────────
    location / {
        root /var/www/nebula-ide;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;
}